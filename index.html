<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="container">
    <div class="card">
      <h2>Payment Details</h2>
      <p class="subtitle">Complete your purchase</p>

      <form action="#" method="post">

        <div class="form-group">
          <label for="name">Cardholder Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label for="card-number">Card Number</label>
          <input type="text" id="card-number" name="card-number" placeholder="1234 5678 9012 3456" maxlength="19" required />
        </div>

        <div class="row">
          <div class="form-group half">
            <label for="expiry">Expiry Date</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5" required />
          </div>
          <div class="form-group half">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="3" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="text" id="amount" name="amount" value="$49.99" readonly />
        </div>

        <button type="submit" class="pay-btn">Pay Now</button>

      </form>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active">
      <span>$</span>
    </div>
  </div>

</body>
</html>
